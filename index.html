<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Vault</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        crossorigin="anonymous"
        referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="style.css">
</head>

<body class="font-inter">

<div class="wrap">

<header>

    <nav class="navbar">
        <div class="logo">
            <img src="assets/logo-navbar.png" alt="Knowledge Vault Logo">
        </div>

        <ul class="menu">
            <li><a href="#">Features</a></li>
            <li><a href="#">How It Works</a></li>
            <li><a href="#">Why It's Different</a></li>
        </ul>

        <button class="btn nav-cta">
            
            Get Early Access
        </button>
    </nav>

    <section id="hero">
        <div class="hero-container">
            <div class="hero-content">

                <button class="btn1 hero-badge">
                    <span class="dot"></span>
                    Early Access Now Open
                </button>

                <h1 class="hero-title">
                    <span class="heading1">Structured Thinking,</span><br>
                    <span class="heading2">Not Just Note-Taking.</span>
                </h1>

                <p class="hero-text">
                    A private space to store notes, links, and learning summaries — designed to<br>
                    help you think clearly, connect ideas, and turn learning into long-term knowledge.
                </p>

                <div class="hero-button">
                    <button class="primary-btn">
                        Start Building Your Vault
                        <i class="fa-solid fa-arrow-right btn-icon"></i>
                    </button>

                    <button class="secondary-btn">
                        <i class="fa-solid fa-play btn-icon"></i>
                        See How It Works
                    </button>
                </div>

            </div>
        </div>
    </section>

</header>

</div>
</body>
</html>
